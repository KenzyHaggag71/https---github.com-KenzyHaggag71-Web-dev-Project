<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Internships - InternHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/shared/shared.css">
  <link rel="stylesheet" href="student.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="container container-spacing" >
  <div class="page-header">
    <h1><i class="fas fa-compass"></i> Explore Internships</h1>
    <p>Find the perfect opportunity for your career growth</p>
  </div>

  <div class="search-box">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="Search by title, company, or keyword...">
  </div>

   <div class="filters-section">
    <div class="work-mode-filters">
      <button class="work-mode-btn active" data-mode="all"><i class="fas fa-globe"></i> All</button>
      <button class="work-mode-btn" data-mode="Remote"><i class="fas fa-home"></i> Remote</button>
      <button class="work-mode-btn" data-mode="Hybrid"><i class="fas fa-sync"></i> Hybrid</button>
      <button class="work-mode-btn" data-mode="On-site"><i class="fas fa-building"></i> On-site</button>
    </div>
    <select id="sortSelect" class="sort-select">
      <option value="recent">Most Recent</option>
      <option value="stipend-high">Stipend: High to Low</option>
      <option value="stipend-low">Stipend: Low to High</option>
    </select>
  </div>

  <div id="internshipsContainer" class="cards-grid"></div>
</div>

<div id="applyModal" class="modal">
  <div class="modal-content">
    <h3>📝 Apply for <span id="modalTitle"></span></h3>
    <p class="apply-company-info">at <strong id="modalCompany"></strong> • <span id="modalWorkMode"></span></p>
    <div id="applyFormContent">
      <div id="applyWarning" class="apply-warning" style="display: none;">
        <i class="fas fa-exclamation-triangle"></i>
        <span>Please complete your profile before applying</span>
      </div>
    <p class="apply-info-text">
        <i class="fas fa-check-circle" ></i>
         Your profile information will be shared with the company
      </p>
      <div class="profile-preview">
        <div><strong>Name:</strong> <span id="previewName"></span></div>
        <div><strong>University:</strong> <span id="previewUniversity"></span></div>
        <div><strong>Major:</strong> <span id="previewMajor"></span></div>
      </div>
      <textarea id="applicantMsg" placeholder="Additional notes for the recruiter (optional)" rows="3" class="modal-input modal-textarea"  ></textarea>
    </div>
    <div class="modal-buttons">
      <button class="modal-cancel" id="closeApplyModalBtn">Cancel</button>
      <button class="modal-submit" id="submitApplyBtn">✨ Submit Application</button>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="/shared/shared.js"></script>
<script src="/shared/data/database.js"></script>
<script src="student.js"></script>
</body>
</html>
