<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Projects - InternHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/shared/shared.css">
  <link rel="stylesheet" href="student.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="container" style="padding-top: 2rem; padding-bottom: 3rem;">
  <div class="page-header">
    <h1><i class="fas fa-tasks" style="color: var(--secondary);"></i> My Projects</h1>
    <p>Projects assigned by mentors - submit your work and track evaluations</p>
  </div>
  
  <div id="studentProjectsContainer" class="projects-list"></div>
</div>

<div id="submitWorkModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-upload"></i> Submit Your Work</h3>
    <p id="submitWorkProjectTitle" style="color: var(--primary); font-weight: 600; margin-bottom: 1rem;"></p>
    
    <div class="input-group">
      <i class="fas fa-heading"></i>
      <input type="text" id="submissionTitle" placeholder="Submission Title" required>
    </div>
    
    <div class="input-group">
      <i class="fas fa-link"></i>
      <input type="url" id="submissionLink" placeholder="Link to your work (Google Drive, GitHub, etc.)">
    </div>
    
    <div class="input-group">
      <i class="fas fa-align-left"></i>
      <textarea id="submissionDescription" placeholder="Describe your work, approach, and any challenges faced" rows="5"></textarea>
    </div>
    
    <div class="modal-buttons">
      <button class="modal-cancel" id="closeWorkModalBtn">Cancel</button>
      <button class="modal-submit" id="submitWorkBtn">Submit Work</button>
    </div>
  </div>
</div>
