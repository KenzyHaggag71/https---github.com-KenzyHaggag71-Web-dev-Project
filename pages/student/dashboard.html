<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dashboard - InternHub</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/shared/shared.css">
  <link rel="stylesheet" href="student.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="container container-spacing">
  <div class="page-header">
    <h1><i class="fas fa-bookmark" ></i> My Saved Internships</h1>
    <p>Internships you've bookmarked for later</p>
  </div>

  <div id="savedInternshipsContainer" class="cards-grid"></div>
</div>

<div id="applyModal" class="modal">
  <div class="modal-content">
    <h3>📝 Apply for <span id="modalTitle"></span></h3>
    <p class="apply-company-info">at <strong id="modalCompany"></strong> • <span id="modalWorkMode"></span></p>
    
    <div id="applyFormContent">
      <div id="applyWarning" class="apply-warning hidden" >
        <i class="fas fa-exclamation-triangle"></i>
        <span>Please complete your profile before applying</span>
      </div>
      
    <p class="apply-info-text"></p>
        <i class="fas fa-check-circle" ></i> 
        Your profile information will be shared with the company
      </p>
      
      <div class="profile-preview">
        <div><strong>Name:</strong> <span id="previewName"></span></div>
        <div><strong>University:</strong> <span id="previewUniversity"></span></div>
        <div><strong>Major:</strong> <span id="previewMajor"></span></div>
      </div>
      
      <textarea id="applicantMsg" class="modal-input modal-textarea" placeholder="Additional notes for the recruiter (optional)" rows="3">
</textarea>
    </div>
    
    <div class="modal-buttons">
      <button class="modal-cancel" id="closeApplyModalBtn">Cancel</button>
      <button class="modal-submit" id="submitApplyBtn">✨ Submit Application</button>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="/shared/shared.js"></script>
<script src="/shared/data/database.js"></script>
<script src="student.js"></script>
</body>
</html>
