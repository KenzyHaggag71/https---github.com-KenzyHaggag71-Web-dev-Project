<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - InternHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/shared/shared.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Welcome Back</h2>
      <p>Sign in to your InternHub account</p>
    </div>
    
    <div class="auth-form">
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="loginEmail" placeholder="Email address" required>
      </div>
      
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="loginPassword" placeholder="Password" required>
      </div>
      
      <div class="input-group">
        <i class="fas fa-user-tag"></i>
        <select id="loginRole" class="form-select">
          <option value="user">👨‍🎓 Student</option>
          <option value="mentor">🎓 Mentor (Year 2-7)</option>
          <option value="company">🏢 Company</option>
          <option value="admin">👑 Admin</option>
        </select>
      </div>
      
      <button id="loginBtn" class="btn-primary" style="width:100%;">Sign In</button>
      
      <p class="auth-switch">
        Don't have an account? <a href="signup.html">Create Account</a>
      </p>
      
      <div class="demo-credentials">
        <p>🔐 Demo Accounts:</p>
        <small>👑 Admin: admin@admin.com / admin123</small>
        <small>🏢 Company: microsoft@company.com / company123</small>
        <small>👨‍🎓 Student: john@stanford.edu / user123</small>
        <small>🎓 Mentor: mentor@university.edu / mentor123</small>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="/shared/shared.js"></script>
<script src="/shared/data/database.js"></script>
<script src="login.js"></script>
</body>
</html>
