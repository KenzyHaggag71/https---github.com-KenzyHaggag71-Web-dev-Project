<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Dashboard - InternHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/shared/shared.css">
  <link rel="stylesheet" href="company.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="container" style="padding-top: 2rem; padding-bottom: 3rem;">
  
  <!-- Tabs Navigation -->
  <div class="company-tabs">
    <button class="tab-btn active" data-tab="post">📝 Post Internship</button>
    <button class="tab-btn" data-tab="listings">📋 My Listings</button>
    <button class="tab-btn" data-tab="students">👥 My Students</button>
  </div>

  <!-- Tab 1: Post Internship -->
  <div id="postTab" class="tab-content active">
    <div class="company-post-section">
      <h3><i class="fas fa-plus-circle"></i> Post an internship</h3>
      <p class="company-post-hint">Your listing will appear in Explore and search for students.</p>
      
      <form id="companyInternshipForm" class="company-internship-form" onsubmit="return false;">
        <input type="hidden" id="ciEditingId" value="">
        
        <div class="input-group">
          <i class="fas fa-heading"></i>
          <input type="text" id="ciTitle" placeholder="Internship title" required maxlength="120">
        </div>
        
        <div class="input-group">
          <i class="fas fa-link"></i>
          <input type="text" id="ciLink" placeholder="Application or info URL (https://...)" required>
          <small class="url-error-message" style="display:none; color:var(--error); font-size:0.7rem;">Please enter a valid URL (e.g., https://example.com)</small>
        </div>
        
        <div class="input-row">
          <div class="input-group half">
            <i class="fas fa-tag"></i>
            <select id="ciType" class="form-select" required>
              <option value="Paid">Paid</option>
              <option value="Unpaid">Unpaid</option>
              <option value="Volunteer">Volunteer</option>
            </select>
          </div>
          <div class="input-group half">
            <i class="fas fa-layer-group"></i>
            <select id="ciCategory" class="form-select" required>
              <option value="Computer Science">Computer Science</option>
              <option value="Engineering">Engineering</option>
              <option value="Business">Business</option>
              <option value="Law">Law</option>
              <option value="Pharmacy">Pharmacy</option>
              <option value="Architecture">Architecture</option>
              <option value="Mass Communication">Mass Communication</option>
              <option value="Arts & Design">Arts & Design</option>
              <option value="Science">Science</option>
            </select>
          </div>
          <div class="input-group half">
            <i class="fas fa-briefcase"></i>
            <select id="ciWorkMode" class="form-select">
              <option value="Remote">Remote</option>
              <option value="Hybrid">Hybrid</option>
              <option value="On-site">On-site</option>
            </select>
          </div>
        </div>
        
        <!-- Duration with Number + Unit -->
        <div class="input-row">
          <div class="input-group half">
            <i class="fas fa-hashtag"></i>
            <input type="number" id="ciDurationValue" placeholder="Duration number" required min="1" step="1" style="width:100%;">
          </div>
          <div class="input-group half">
            <i class="fas fa-calendar-alt"></i>
            <select id="ciDurationUnit" class="form-select" required>
              <option value="days">Days</option>
              <option value="weeks" selected>Weeks</option>
              <option value="months">Months</option>
            </select>
          </div>
        </div>
        
        <div id="ciPriceRow" class="input-group" style="display:none;">
          <i class="fas fa-dollar-sign"></i>
          <input type="number" id="ciPriceMonthly" placeholder="Monthly stipend (USD)" min="1" step="1">
        </div>
        
        <div class="input-group">
          <i class="fas fa-map-marker-alt"></i>
          <input type="text" id="ciLocation" placeholder="Location (optional)" maxlength="80">
        </div>
        
        <div class="input-group">
          <i class="fas fa-align-left"></i>
          <textarea id="ciDescription" placeholder="Short description (optional)" rows="2" maxlength="500"></textarea>
        </div>
        
        <div style="display: flex; gap: 0.75rem; margin-top: 0.5rem;">
          <button type="button" id="ciSubmitBtn" class="btn-primary" style="flex:1;">Publish internship</button>
          <button type="button" id="ciCancelEditBtn" class="btn-outline" style="display:none;">Cancel edit</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Tab 2: My Listings -->
  <div id="listingsTab" class="tab-content" style="display:none;">
    <div class="company-listings-section">
      <h3><i class="fas fa-list"></i> My Internship Listings</h3>
      <div id="companyListingsContainer" class="company-listings-container"></div>
    </div>
  </div>

  <!-- Tab 3: My Students -->
  <div id="studentsTab" class="tab-content" style="display:none;">
    <div class="company-students-section">
      <h3><i class="fas fa-users"></i> Students in My Internships</h3>
      <p class="company-post-hint">View all students who applied to your internships and add feedback.</p>
      
      <!-- Filter by Internship -->
      <div class="input-group" style="margin-bottom: 1.5rem;">
        <i class="fas fa-filter"></i>
        <select id="filterInternshipSelect" class="form-select">
          <option value="all">All Internships</option>
        </select>
      </div>
      
      <div id="studentsListContainer" class="students-list-container"></div>
    </div>
  </div>
</div>

<!-- Add Feedback Modal -->
<div id="feedbackModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-comment-dots"></i> Add Feedback for Student</h3>
    <p id="feedbackStudentName" style="color: var(--primary); font-weight: 600; margin-bottom: 0.5rem;"></p>
    <p id="feedbackInternshipTitle" style="color: var(--text-light); margin-bottom: 1rem;"></p>
    
    <div class="input-group">
      <i class="fas fa-star"></i>
      <select id="feedbackRating" class="form-select" required>
        <option value="">Select Rating</option>
        <option value="5">⭐⭐⭐⭐⭐ - Excellent</option>
        <option value="4">⭐⭐⭐⭐ - Very Good</option>
        <option value="3">⭐⭐⭐ - Good</option>
        <option value="2">⭐⭐ - Fair</option>
        <option value="1">⭐ - Needs Improvement</option>
      </select>
    </div>
    
    <div class="input-group">
      <i class="fas fa-comment"></i>
      <textarea id="feedbackText" placeholder="Write your feedback here..." rows="4"></textarea>
    </div>
    
    <div class="modal-buttons">
      <button class="modal-cancel" id="closeFeedbackModalBtn">Cancel</button>
      <button class="modal-submit" id="submitFeedbackBtn">Submit Feedback</button>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="/shared/shared.js"></script>
<script src="/shared/data/database.js"></script>
<script src="company.js"></script>
</body>
</html>
