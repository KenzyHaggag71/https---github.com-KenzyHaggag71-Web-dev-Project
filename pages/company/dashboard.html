<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Dashboard - InternHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/shared/shared.css">
  <link rel="stylesheet" href="company.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="container" style="padding-top: 2rem; padding-bottom: 3rem;">
  <div class="page-header">
    <h1><i class="fas fa-building" style="color: var(--secondary);"></i> Company Dashboard</h1>
    <p>Manage your internship listings and view applicants</p>
  </div>
  
  <div id="companyPostSection" class="company-post-section">
    <h3 id="ciFormSectionTitle"><i class="fas fa-plus-circle"></i> Post an internship</h3>
    <p class="company-post-hint">Your listing will appear in Explore and search for students.</p>
    
    <form id="companyInternshipForm" class="company-internship-form" onsubmit="return false;">
      <input type="hidden" id="ciEditingId" value="">
      
      <div class="input-group">
        <i class="fas fa-heading"></i>
        <input type="text" id="ciTitle" placeholder="Internship title" required maxlength="120">
      </div>
      
      <div class="input-group">
        <i class="fas fa-link"></i>
        <input type="url" id="ciLink" placeholder="Application or info URL (https://...)" required>
      </div>
      
      <div class="input-row">
        <div class="input-group half">
          <i class="fas fa-tag"></i>
          <select id="ciType" class="form-select" required>
            <option value="Paid">Paid</option>
            <option value="Unpaid">Unpaid</option>
            <option value="Volunteer">Volunteer</option>
          </select>
        </div>
        <div class="input-group half">
          <i class="fas fa-layer-group"></i>
          <select id="ciCategory" class="form-select" required>
            <option value="Computer Science">Computer Science</option>
            <option value="Engineering">Engineering</option>
            <option value="Business">Business</option>
            <option value="Law">Law</option>
            <option value="Pharmacy">Pharmacy</option>
            <option value="Architecture">Architecture</option>
            <option value="Mass Communication">Mass Communication</option>
            <option value="Arts & Design">Arts & Design</option>
            <option value="Science">Science</option>
          </select>
        </div>
        <div class="input-group half">
          <i class="fas fa-briefcase"></i>
          <select id="ciWorkMode" class="form-select">
            <option value="Remote">Remote</option>
            <option value="Hybrid">Hybrid</option>
            <option value="On-site">On-site</option>
          </select>
        </div>
      </div>
      
      <div class="input-group">
        <i class="far fa-calendar-alt"></i>
        <input type="text" id="ciDuration" placeholder="Duration (e.g. 12 weeks, 6 months)" required maxlength="80">
      </div>
      
      <div id="ciPriceRow" class="input-group" style="display:none;">
        <i class="fas fa-dollar-sign"></i>
        <input type="number" id="ciPriceMonthly" placeholder="Monthly stipend (USD)" min="1" step="1">
      </div>
      
      <div class="input-group">
        <i class="fas fa-map-marker-alt"></i>
        <input type="text" id="ciLocation" placeholder="Location (optional)" maxlength="80">
      </div>
      
      <div class="input-group">
        <i class="fas fa-align-left"></i>
        <textarea id="ciDescription" placeholder="Short description (optional)" rows="2" maxlength="500"></textarea>
      </div>
      
      <div style="display: flex; gap: 0.75rem; margin-top: 0.5rem;">
        <button type="button" id="ciSubmitBtn" class="btn-primary" style="flex:1;">Publish internship</button>
        <button type="button" id="ciCancelEditBtn" class="btn-outline" style="display:none;">Cancel edit</button>
      </div>
    </form>
  </div>
  
  <h3 style="color: var(--primary); margin-bottom: 1rem;"><i class="fas fa-list"></i> Your Internship Listings</h3>
  <div id="companyListingsContainer" class="company-listings-container"></div>
</div>

<div id="footer-placeholder"></div>

<script src="/shared/shared.js"></script>
<script src="/shared/data/database.js"></script>
<script src="company.js"></script>
</body>
</html>
