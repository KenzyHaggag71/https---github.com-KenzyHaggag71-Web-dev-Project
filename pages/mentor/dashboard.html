<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentor Hub - InternHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../../shared/shared.css">
  <link rel="stylesheet" href="mentor.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="container" style="padding-top:2rem;padding-bottom:3rem;">
  <div class="page-header">
    <h1>Mentor Hub</h1>
    <p>Assign projects to students and evaluate submissions</p>
  </div>

  <div class="mentor-assign-section">
    <h3>Assign New Project</h3>
    <p class="form-hint">Create a project based on an internship you've taken</p>
    <form id="assignProjectForm">
      <div class="input-group">
        <i class="fas fa-briefcase"></i>
        <select id="projectInternshipSelect" class="form-select">
          <option value="">Select Internship</option>
        </select>
      </div>
      <div class="input-row">
        <div class="input-group half">
          <i class="fas fa-building"></i>
          <input type="text" id="projectCompany" placeholder="Company" readonly style="background:var(--light-yellow);">
        </div>
        <div class="input-group half">
          <i class="fas fa-tag"></i>
          <input type="text" id="projectCategory" placeholder="Category" readonly style="background:var(--light-yellow);">
        </div>
      </div>
      <div class="input-group">
        <i class="fas fa-heading"></i>
        <input type="text" id="projectTitle" placeholder="Project Title" required>
      </div>
      <div class="input-group">
        <i class="fas fa-align-left"></i>
        <textarea id="projectDescription" placeholder="Project Description" rows="4" required></textarea>
      </div>
      <div class="input-row">
        <div class="input-group half">
          <i class="fas fa-calendar-alt"></i>
          <input type="date" id="projectDeadline" required>
        </div>
        <div class="input-group half">
          <i class="fas fa-users"></i>
          <select id="projectTargetYear" class="form-select" required>
            <option value="">Assign to Year</option>
            <option value="1">Year 1</option>
            <option value="2">Year 2</option>
            <option value="both">Both Year 1 & 2</option>
            <option value="specific">Select Students</option>
          </select>
        </div>
      </div>
      <div class="input-group" id="multiUserSelectGroup" style="display:none;">
        <i class="fas fa-user-check"></i>
        <select id="projectAssignedUsers" multiple class="form-select" style="height:150px;"></select>
        <small class="multi-select-hint">Hold Ctrl/Cmd to select multiple</small>
      </div>
      <div class="input-group">
        <i class="fas fa-file-alt"></i>
        <textarea id="projectInstructions" placeholder="Additional instructions (optional)" rows="2"></textarea>
      </div>
      <button type="button" id="assignProjectBtn" class="btn-primary" style="width:100%;">Assign Project</button>
    </form>
  </div>

  <div class="mentor-assign-section">
    <h3>My Assigned Projects</h3>
    <div id="mentorProjectsList"></div>
  </div>

  <div class="mentor-assign-section">
    <h3>Pending Submissions</h3>
    <div id="mentorSubmissionsList"></div>
  </div>
</div>

<div id="evaluateModal" class="modal">
  <div class="modal-content">
    <h3>Evaluate Submission</h3>
    <p id="evaluateStudentName"></p>
    <p id="evaluateProjectTitle"></p>
    <div class="input-group">
      <i class="fas fa-trophy"></i>
      <select id="evaluationGrade" class="form-select">
        <option value="">Select Grade</option>
        <option value="A">A - Excellent</option>
        <option value="B">B - Very Good</option>
        <option value="C">C - Good</option>
        <option value="D">D - Satisfactory</option>
        <option value="F">F - Needs Improvement</option>
      </select>
    </div>
    <div class="input-group">
      <i class="fas fa-comment"></i>
      <textarea id="evaluationFeedback" placeholder="Feedback" rows="4"></textarea>
    </div>
    <div class="modal-buttons">
      <button class="modal-cancel" id="closeEvaluateModalBtn">Cancel</button>
      <button class="modal-submit" id="submitEvaluationBtn">Submit</button>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="../../shared/data/database.js"></script>
<script src="../../shared/shared.js"></script>
<script src="mentor.js"></script>
</body>
</html>
