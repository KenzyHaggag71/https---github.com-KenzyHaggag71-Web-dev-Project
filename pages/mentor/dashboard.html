<!DOCTYPE html>
<html lang="en">
    <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentor Dashboard - InternHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/shared/shared.css">
  <link rel="stylesheet" href="mentor.css">
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div class="container" >
  <div class="page-header">
    <h1><i class="fas fa-chalkboard-teacher" ></i> Mentor Dashboard</h1>
    <p>Manage your projects, assign tasks to students, and evaluate submissions</p>
  </div>
  
  <!-- Assign Project Section -->
div class="mentor-assign-section">
    <h3><i class="fas fa-plus-circle"></i> Assign New Project</h3>
    <p class="form-hint">Create a project based on an internship you've taken, assign it to Year 1 or Year 2 students</p>

     <form id="assignProjectForm">
      <div class="input-group">
        <i class="fas fa-briefcase"></i>
        <select id="projectInternshipSelect" class="form-select" required>
          <option value="">Select Internship (from your taken internships)</option>
        </select>
      </div>

<div class="input-row">
        <div class="input-group half">
          <i class="fas fa-building"></i>
          <input type="text" id="projectCompany" placeholder="Company Name" readonly style="background: var(--bg-light);">
        </div>
        <div class="input-group half">
          <i class="fas fa-tag"></i>
          <input type="text" id="projectCategory" placeholder="Category" readonly style="background: var(--bg-light);">
        </div>
      </div>    
</body>
    </html>
